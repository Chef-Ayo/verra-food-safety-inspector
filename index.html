<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام بنود مراقبة الجودة وسلامة الأغذية | Food Safety & Quality Inspection</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a6b4a;
            --primary-dark: #0f4d35;
            --primary-light: #e8f5ee;
            --accent: #c9a84c;
            --accent-light: #fdf6e3;
            --danger: #c0392b;
            --danger-light: #fdeaea;
            --warning: #d68910;
            --warning-light: #fef5e7;
            --success: #27ae60;
            --success-light: #e8f8f0;
            --info: #2980b9;
            --info-light: #eaf2f8;
            --dark: #1a1a2e;
            --gray: #6c757d;
            --gray-light: #f8f9fa;
            --white: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f4f1 0%, #e8f5ee 50%, #f5f0e8 100%);
            min-height: 100vh;
            color: var(--dark);
            line-height: 1.7;
            padding-bottom: 90px;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 24px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.3;
        }

        .logo-text .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }

        .header-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255,255,255,0.12);
            color: var(--white);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .progress-section {
            background: rgba(255,255,255,0.08);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-header span {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            font-weight: 600;
        }

        .progress-header .percent {
            color: var(--accent);
            font-weight: 800;
            font-size: 18px;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #e8d5a3);
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        .progress-stats {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .stat i { font-size: 10px; }
        .stat .pass { color: #7ee8a8; }
        .stat .fail { color: #ff9999; }
        .stat .pending { color: #ffd699; }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== CATEGORY CARD ===== */
        .category-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .category-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .category-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .category-header:hover {
            background: var(--gray-light);
        }

        .category-title-area {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .category-icon {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .cat-receiving .category-icon { background: var(--info-light); color: var(--info); }
        .cat-preparation .category-icon { background: var(--warning-light); color: var(--warning); }
        .cat-quality .category-icon { background: var(--success-light); color: var(--success); }
        .cat-facility .category-icon { background: var(--primary-light); color: var(--primary); }
        .cat-cleaning .category-icon { background: #f0e8f8; color: #7d3c98; }
        .cat-hygiene .category-icon { background: #e8f4f8; color: #1abc9c; }
        .cat-equipment .category-icon { background: #f8e8e8; color: #c0392b; }
        .cat-traceability .category-icon { background: #e8f0f8; color: #2c3e50; }
        .cat-water .category-icon { background: #e8f8f8; color: #16a085; }
        .cat-allergen .category-icon { background: #f8f0e8; color: #d68910; }

        .category-name {
            min-width: 0;
        }

        .category-name h3 {
            font-size: 16px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 2px;
        }

        .category-name .en-name {
            font-size: 12px;
            color: var(--gray);
            font-weight: 500;
        }

        .category-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .mini-progress {
            width: 60px;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s;
        }

        .category-count {
            font-size: 12px;
            color: var(--gray);
            font-weight: 600;
            min-width: 40px;
            text-align: left;
        }

        .chevron {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gray-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            transition: transform 0.3s, background 0.2s;
            font-size: 14px;
            flex-shrink: 0;
        }

        .category-card.open .chevron {
            transform: rotate(180deg);
            background: var(--primary-light);
            color: var(--primary);
        }

        /* ===== ITEMS LIST ===== */
        .items-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-card.open .items-container {
            max-height: 8000px;
        }

        .items-list {
            padding: 0 24px 20px;
        }

        .item-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row:hover {
            background: var(--gray-light);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: var(--radius-sm);
        }

        .item-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gray-light);
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.3s;
        }

        .item-row.pass .item-number {
            background: var(--success-light);
            color: var(--success);
        }

        .item-row.fail .item-number {
            background: var(--danger-light);
            color: var(--danger);
        }

        .item-row.na .item-number {
            background: #f0f0f0;
            color: #999;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-text-ar {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
            line-height: 1.6;
            word-break: break-word;
        }

        .item-text-en {
            font-size: 12px;
            color: var(--gray);
            font-weight: 400;
            line-height: 1.5;
            word-break: break-word;
            direction: ltr;
            text-align: left;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 2px solid #e0e0e0;
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .btn-pass {
            color: var(--success);
            border-color: #c8e6c9;
        }

        .btn-pass:hover, .btn-pass.active {
            background: var(--success-light);
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(39,174,96,0.15);
        }

        .btn-fail {
            color: var(--danger);
            border-color: #ffcdd2;
        }

        .btn-fail:hover, .btn-fail.active {
            background: var(--danger-light);
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
        }

        .btn-na {
            color: var(--gray);
            border-color: #e0e0e0;
            font-size: 11px;
            font-weight: 700;
        }

        .btn-na:hover, .btn-na.active {
            background: #f5f5f5;
            border-color: var(--gray);
        }

        .btn-photo {
            color: var(--info);
            border-color: #bbdefb;
            font-size: 16px;
        }

        .btn-photo:hover, .btn-photo.active {
            background: var(--info-light);
            border-color: var(--info);
        }

        .btn-photo.has-photo {
            background: var(--info-light);
            border-color: var(--info);
            color: var(--info);
        }

        /* ===== PHOTO PREVIEW ===== */
        .photo-preview {
            width: 100%;
            margin-top: 10px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: none;
        }

        .photo-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }

        .photo-preview.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FOOTER ACTIONS ===== */
        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
            z-index: 100;
            border-top: 1px solid #f0f0f0;
        }

        .footer-actions .spacer {
            flex: 1;
        }

        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-outline {
            background: var(--white);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary-light);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(26,107,74,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,107,74,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 800;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--gray-light);
            cursor: pointer;
            font-size: 16px;
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== REPORT STYLES ===== */
        .report-summary {
            background: var(--gray-light);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .report-stat {
            text-align: center;
            padding: 14px;
            border-radius: var(--radius-sm);
        }

        .report-stat.pass { background: var(--success-light); }
        .report-stat.fail { background: var(--danger-light); }
        .report-stat.na { background: #f0f0f0; }

        .report-stat .value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .report-stat.pass .value { color: var(--success); }
        .report-stat.fail .value { color: var(--danger); }
        .report-stat.na .value { color: var(--gray); }

        .report-stat .label {
            font-size: 12px;
            color: var(--gray);
            font-weight: 600;
        }

        .report-score {
            text-align: center;
            padding: 16px;
            background: var(--white);
            border-radius: var(--radius-sm);
        }

        .report-score .score-value {
            font-size: 42px;
            font-weight: 900;
            color: var(--primary);
        }

        .report-score .score-label {
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
        }

        .report-category {
            margin-bottom: 16px;
            padding: 14px;
            border-radius: var(--radius-sm);
            border-right: 4px solid;
        }

        .report-category.pass { background: var(--success-light); border-color: var(--success); }
        .report-category.fail { background: var(--danger-light); border-color: var(--danger); }
        .report-category.partial { background: var(--warning-light); border-color: var(--warning); }

        .report-category h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .report-category .cat-stats {
            font-size: 12px;
            color: var(--gray);
        }

        /* ===== HIDDEN FILE INPUT ===== */
        .file-input {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .logo-text h1 { font-size: 16px; }
            .category-header { padding: 16px 18px; }
            .items-list { padding: 0 18px 16px; }
            .item-text-ar { font-size: 13px; }
            .item-text-en { font-size: 11px; }
            .footer-actions { padding: 12px 16px; }
            .btn { padding: 10px 18px; font-size: 13px; }
            .item-actions { gap: 6px; }
            .action-btn { width: 34px; height: 34px; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }

        /* ===== ANIMATIONS ===== */
        .category-card {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
    <div class="header-content">
        <div class="header-top">
            <div class="logo-section">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">
                    <h1>نظام بنود مراقبة الجودة وسلامة الأغذية</h1>
                    <div class="subtitle">Food Safety & Quality Inspection System</div>
                </div>
            </div>
            <div class="header-badges">
                <span class="badge">SFDA</span>
                <span class="badge">HACCP</span>
            </div>
        </div>
        <div class="progress-section">
            <div class="progress-header">
                <span>نسبة الإنجاز</span>
                <span class="percent" id="totalPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="totalProgress"></div>
            </div>
            <div class="progress-stats">
                <div class="stat"><i class="fas fa-check-circle pass"></i> <span id="passCount">0</span> مطابق</div>
                <div class="stat"><i class="fas fa-times-circle fail"></i> <span id="failCount">0</span> غير مطابق</div>
                <div class="stat"><i class="fas fa-minus-circle pending"></i> <span id="pendingCount">0</span> متبقي</div>
            </div>
        </div>
    </div>
</header>

<!-- ===== MAIN ===== -->
<main class="main-content" id="mainContent">
    <!-- Categories will be injected here -->
</main>

<!-- Spacer for fixed footer -->
<div style="height: 90px;"></div>

<!-- ===== FOOTER ACTIONS ===== -->
<div class="footer-actions">
    <button class="btn btn-outline" onclick="resetAll()">
        <i class="fas fa-redo"></i> إعادة تعيين
    </button>
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="showReport()">
        <i class="fas fa-file-alt"></i> عرض التقرير
    </button>
</div>

<!-- ===== REPORT MODAL ===== -->
<div class="modal-overlay" id="reportModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-clipboard-check" style="color: var(--primary); margin-left: 8px;"></i> تقرير الفحص</h3>
            <button class="modal-close" onclick="closeReport()">&times;</button>
        </div>
        <div class="modal-body" id="reportBody">
            <!-- Report content -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeReport()">إغلاق</button>
            <button class="btn btn-primary" onclick="downloadReport()">
                <i class="fas fa-download"></i> تحميل التقرير
            </button>
        </div>
    </div>
</div>

<!-- Hidden file input for photos -->
<input type="file" class="file-input" id="photoInput" accept="image/*" capture="environment">

<script>
// ===== DATA =====
const categories = [
    {
        id: 'receiving',
        icon: '📦',
        ar: 'الاستلام والتخزين',
        en: 'Receiving & Storage',
        items: [
            { ar: 'يتم فحص جميع المواد الغذائية الواردة لدرجة الحرارة عند التسليم', en: 'All incoming food items are checked for temperature upon delivery' },

// State
let state = {};
let currentPhotoItem = null;

// Initialize
function init() {
    loadState();
    renderCategories();
    updateProgress();
}

function loadState() {
    const saved = localStorage.getItem('verraInspectionState');
    if (saved) {
        state = JSON.parse(saved);
    } else {
        categories.forEach(cat => {
            cat.items.forEach((item, idx) => {
                const key = `${cat.id}_${idx}`;
                state[key] = { status: null, photo: null, note: '' };
            });
        });
    }
}

function saveState() {
    localStorage.setItem('verraInspectionState', JSON.stringify(state));
}

function renderCategories() {
    const container = document.getElementById('mainContent');
    container.innerHTML = categories.map((cat, catIdx) => {
        const totalItems = cat.items.length;
        const answered = cat.items.filter((_, i) => state[`${cat.id}_${i}`]?.status !== null).length;
        const passed = cat.items.filter((_, i) => state[`${cat.id}_${i}`]?.status === 'pass').length;
        const percent = totalItems > 0 ? Math.round((answered / totalItems) * 100) : 0;
        const color = answered === totalItems ? (passed === totalItems ? 'var(--success)' : 'var(--warning)') : 'var(--primary)';

        return `
        <div class="category-card cat-${cat.id}" id="cat-${cat.id}">
            <div class="category-header" onclick="toggleCategory('${cat.id}')">
                <div class="category-title-area">
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">
                        <h3>${cat.ar}</h3>
                        <div class="en-name">${cat.en}</div>
                    </div>
                </div>
                <div class="category-meta">
                    <div class="mini-progress">
                        <div class="mini-progress-fill" style="width:${percent}%; background:${color}"></div>
                    </div>
                    <div class="category-count">${answered}/${totalItems}</div>
                    <div class="chevron"><i class="fas fa-chevron-down"></i></div>
                </div>
            </div>
            <div class="items-container">
                <div class="items-list">
                    ${cat.items.map((item, idx) => {
                        const key = `${cat.id}_${idx}`;
                        const st = state[key] || { status: null, photo: null };
                        const statusClass = st.status || '';
                        const photoClass = st.photo ? 'has-photo' : '';
                        return `
                        <div class="item-row ${statusClass}" id="item-${key}">
                            <div class="item-number">${idx + 1}</div>
                            <div class="item-content">
                                <div class="item-text-ar">${item.ar}</div>
                                <div class="item-text-en">${item.en}</div>
                                ${st.photo ? `<div class="photo-preview show" id="preview-${key}"><img src="${st.photo}" alt="photo"></div>` : `<div class="photo-preview" id="preview-${key}"></div>`}
                            </div>
                            <div class="item-actions">
                                <button class="action-btn btn-pass ${st.status === 'pass' ? 'active' : ''}" onclick="event.stopPropagation(); setStatus('${key}', 'pass')" title="مطابق">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button class="action-btn btn-fail ${st.status === 'fail' ? 'active' : ''}" onclick="event.stopPropagation(); setStatus('${key}', 'fail')" title="غير مطابق">
                                    <i class="fas fa-times"></i>
                                </button>
                                <button class="action-btn btn-na ${st.status === 'na' ? 'active' : ''}" onclick="event.stopPropagation(); setStatus('${key}', 'na')" title="لا ينطبق">
                                    N/A
                                </button>
                                <button class="action-btn btn-photo ${photoClass}" onclick="event.stopPropagation(); takePhoto('${key}')" title="📷 Take Photo">
                                    <i class="fas fa-camera"></i>
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            </div>
        </div>
        `;
    }).join('');
}

function toggleCategory(catId) {
    const card = document.getElementById(`cat-${catId}`);
    card.classList.toggle('open');
}

function setStatus(key, status) {
    state[key] = state[key] || {};
    state[key].status = state[key].status === status ? null : status;
    saveState();

    // Update UI for this item only (no re-render of whole page)
    const row = document.getElementById(`item-${key}`);
    row.classList.remove('pass', 'fail', 'na');
    if (state[key].status) row.classList.add(state[key].status);

    // Update buttons
    const buttons = row.querySelectorAll('.action-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    if (state[key].status) {
        const activeBtn = row.querySelector(`.btn-${state[key].status}`);
        if (activeBtn) activeBtn.classList.add('active');
    }

    updateProgress();
    updateCategoryProgress(key.split('_')[0]);
}

function updateCategoryProgress(catId) {
    const cat = categories.find(c => c.id === catId);
    if (!cat) return;
    const totalItems = cat.items.length;
    const answered = cat.items.filter((_, i) => state[`${catId}_${i}`]?.status !== null).length;
    const passed = cat.items.filter((_, i) => state[`${catId}_${i}`]?.status === 'pass').length;
    const percent = totalItems > 0 ? Math.round((answered / totalItems) * 100) : 0;
    const color = answered === totalItems ? (passed === totalItems ? 'var(--success)' : 'var(--warning)') : 'var(--primary)';

    const card = document.getElementById(`cat-${catId}`);
    if (card) {
        const fill = card.querySelector('.mini-progress-fill');
        const count = card.querySelector('.category-count');
        if (fill) {
            fill.style.width = percent + '%';
            fill.style.background = color;
        }
        if (count) count.textContent = answered + '/' + totalItems;
    }
}

function takePhoto(key) {
    currentPhotoItem = key;
    document.getElementById('photoInput').click();
}

document.getElementById('photoInput').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0] && currentPhotoItem) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            state[currentPhotoItem] = state[currentPhotoItem] || {};
            state[currentPhotoItem].photo = evt.target.result;
            saveState();

            const preview = document.getElementById(`preview-${currentPhotoItem}`);
            if (preview) {
                preview.innerHTML = `<img src="${evt.target.result}" alt="photo">`;
                preview.classList.add('show');
            }

            const btn = document.querySelector(`#item-${currentPhotoItem} .btn-photo`);
            if (btn) btn.classList.add('has-photo');
        };
        reader.readAsDataURL(file);
    }
    e.target.value = '';
    currentPhotoItem = null;
});

function updateProgress() {
    let total = 0, pass = 0, fail = 0, answered = 0;
    Object.values(state).forEach(s => {
        total++;
        if (s.status === 'pass') { pass++; answered++; }
        else if (s.status === 'fail') { fail++; answered++; }
        else if (s.status === 'na') { answered++; }
    });

    const percent = total > 0 ? Math.round((answered / total) * 100) : 0;

    document.getElementById('totalPercent').textContent = percent + '%';
    document.getElementById('totalProgress').style.width = percent + '%';
    document.getElementById('passCount').textContent = pass;
    document.getElementById('failCount').textContent = fail;
    document.getElementById('pendingCount').textContent = total - answered;
}

function resetAll() {
    if (!confirm('هل أنت متأكد من إعادة تعيين جميع البنود؟')) return;
    Object.keys(state).forEach(key => {
        state[key] = { status: null, photo: null, note: '' };
    });
    saveState();
    renderCategories();
    updateProgress();
}

function showReport() {
    const modal = document.getElementById('reportModal');
    const body = document.getElementById('reportBody');

    let total = 0, pass = 0, fail = 0, na = 0;
    Object.values(state).forEach(s => {
        total++;
        if (s.status === 'pass') pass++;
        else if (s.status === 'fail') fail++;
        else if (s.status === 'na') na++;
    });

    const score = total > 0 ? Math.round((pass / (total - na)) * 100) : 0;
    const dateStr = new Date().toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });

    let catReports = categories.map(cat => {
        const catTotal = cat.items.length;
        const catPass = cat.items.filter((_, i) => state[`${cat.id}_${i}`]?.status === 'pass').length;
        const catFail = cat.items.filter((_, i) => state[`${cat.id}_${i}`]?.status === 'fail').length;
        const catAnswered = cat.items.filter((_, i) => state[`${cat.id}_${i}`]?.status !== null).length;

        let status = 'pass';
        if (catFail > 0) status = 'fail';
        else if (catPass < catTotal && catAnswered === catTotal) status = 'partial';
        else if (catAnswered < catTotal) status = 'partial';

        const statusText = status === 'pass' ? '✅ مطابق' : status === 'fail' ? '❌ يوجد مخالفات' : '⏳ جزئي';

        return `
        <div class="report-category ${status}">
            <h4>${cat.icon} ${cat.ar}</h4>
            <div class="cat-stats">${statusText} — ${catPass} مطابق / ${catFail} غير مطابق من ${catTotal} بنود</div>
        </div>
        `;
    }).join('');

    body.innerHTML = `
        <div class="report-summary">
            <div style="text-align:center; margin-bottom:16px; color:var(--gray); font-size:13px;">
                <i class="far fa-calendar-alt"></i> ${dateStr}
            </div>
            <div class="report-grid">
                <div class="report-stat pass">
                    <div class="value">${pass}</div>
                    <div class="label">مطابق</div>
                </div>
                <div class="report-stat fail">
                    <div class="value">${fail}</div>
                    <div class="label">غير مطابق</div>
                </div>
                <div class="report-stat na">
                    <div class="value">${na}</div>
                    <div class="label">لا ينطبق</div>
                </div>
            </div>
            <div class="report-score">
                <div class="score-value">${isNaN(score) ? 0 : score}%</div>
                <div class="score-label">نسبة الالتزام</div>
            </div>
        </div>
        <h4 style="margin-bottom:12px; font-size:14px;">📊 تفصيل حسب القسم</h4>
        ${catReports}
    `;

    modal.classList.add('show');
}

function closeReport() {
    document.getElementById('reportModal').classList.remove('show');
}

function downloadReport() {
    let total = 0, pass = 0, fail = 0, na = 0;
    Object.values(state).forEach(s => {
        total++;
        if (s.status === 'pass') pass++;
        else if (s.status === 'fail') fail++;
        else if (s.status === 'na') na++;
    });

    const score = total > 0 ? Math.round((pass / (total - na)) * 100) : 0;
    const dateStr = new Date().toLocaleDateString('ar-SA');

    let reportText = `═══════════════════════════════════════════════════\n`;
    reportText += `  نظام بنود مراقبة الجودة وسلامة الأغذية\n`;
    reportText += `  Food Safety & Quality Inspection Report\n`;
    reportText += `  التاريخ: ${dateStr}\n`;
    reportText += `═══════════════════════════════════════════════════\n\n`;
    reportText += `📊 ملخص عام:\n`;
    reportText += `   ✅ مطابق: ${pass}\n`;
    reportText += `   ❌ غير مطابق: ${fail}\n`;
    reportText += `   ➖ لا ينطبق: ${na}\n`;
    reportText += `   📈 نسبة الالتزام: ${isNaN(score) ? 0 : score}%\n\n`;

    categories.forEach(cat => {
        reportText += `─────────────────────────────────────────────────\n`;
        reportText += `📂 ${cat.ar} | ${cat.en}\n`;
        reportText += `─────────────────────────────────────────────────\n`;
        cat.items.forEach((item, idx) => {
            const key = `${cat.id}_${idx}`;
            const st = state[key]?.status;
            const symbol = st === 'pass' ? '✅' : st === 'fail' ? '❌' : st === 'na' ? '➖' : '⬜';
            reportText += `${symbol} ${idx + 1}. ${item.ar}\n`;
            reportText += `   ${item.en}\n\n`;
        });
    });

    reportText += `═══════════════════════════════════════════════════\n`;
    reportText += `  متوافق مع معايير SFDA السعودية ونظام HACCP\n`;
    reportText += `═══════════════════════════════════════════════════\n`;

    const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Verra_Inspection_Report_${dateStr}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

// Close modal on overlay click
document.getElementById('reportModal').addEventListener('click', function(e) {
    if (e.target === this) closeReport();
});

// Init
init();
</script>
